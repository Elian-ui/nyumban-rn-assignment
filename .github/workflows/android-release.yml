name: Android APK release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-apk:
    name: Build and publish signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Validate release secrets
        env:
          ASSESSMENT_KEY: ${{ secrets.ASSESSMENT_KEY }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.NYUMBAN_UPLOAD_KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.NYUMBAN_UPLOAD_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.NYUMBAN_UPLOAD_KEY_PASSWORD }}
        run: |
          test -n "$ASSESSMENT_KEY"
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$KEY_ALIAS"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_PASSWORD"

      - name: Restore application environment
        env:
          ASSESSMENT_KEY: ${{ secrets.ASSESSMENT_KEY }}
        run: printf 'ASSESSMENT_KEY=%s\n' "$ASSESSMENT_KEY" > .env

      - name: Restore upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/my-upload-key.keystore

      - name: Configure release signing
        env:
          KEY_ALIAS: ${{ secrets.NYUMBAN_UPLOAD_KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.NYUMBAN_UPLOAD_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.NYUMBAN_UPLOAD_KEY_PASSWORD }}
        run: |
          mkdir -p "$HOME/.gradle"
          printf '%s\n' \
            'NYUMBAN_UPLOAD_STORE_FILE=my-upload-key.keystore' \
            "NYUMBAN_UPLOAD_KEY_ALIAS=$KEY_ALIAS" \
            "NYUMBAN_UPLOAD_STORE_PASSWORD=$STORE_PASSWORD" \
            "NYUMBAN_UPLOAD_KEY_PASSWORD=$KEY_PASSWORD" \
            >> "$HOME/.gradle/gradle.properties"

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      - name: Prepare release asset
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          test -s android/app/build/outputs/apk/release/app-release.apk
          cp android/app/build/outputs/apk/release/app-release.apk "nyumban-$RELEASE_TAG.apk"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          ASSET="nyumban-$RELEASE_TAG.apk"
          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ASSET" --clobber
          else
            gh release create "$RELEASE_TAG" "$ASSET" \
              --title "Nyumban $RELEASE_TAG" \
              --generate-notes
          fi
